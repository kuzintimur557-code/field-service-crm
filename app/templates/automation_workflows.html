<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A3 Цепочки автоматизации</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="stylesheet" href="/static/app.css">

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:#f3f4f6;color:#111827}
.container{max-width:1180px;margin:auto;padding:24px}
.header{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:18px}
.card{background:white;padding:24px;border-radius:24px;box-shadow:0 10px 25px rgba(0,0,0,.07);margin-bottom:16px}
.back{display:inline-block;padding:12px 16px;border-radius:14px;background:#111827;color:white;text-decoration:none;font-weight:900;border:0;cursor:pointer}
h1{margin:0 0 8px;font-size:34px}
h2{margin:0 0 16px;font-size:22px}
.meta{color:#6b7280;font-weight:800;line-height:1.45}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(310px,1fr));gap:16px}
.workflow{border:1px solid #e5e7eb;background:#f9fafb;border-radius:22px;padding:18px}
.workflow-title{font-size:18px;font-weight:900;margin-bottom:8px}
.pill{display:inline-block;padding:7px 10px;border-radius:999px;background:#dbeafe;color:#1d4ed8;font-weight:900;font-size:13px;margin-right:6px;margin-top:6px}
.pill.ok{background:#dcfce7;color:#166534}
.pill.warn{background:#fef3c7;color:#92400e}
.pill.off{background:#fee2e2;color:#991b1b}
.graph-box{margin-top:16px;padding:14px;border-radius:18px;background:white;border:1px solid #e5e7eb;overflow:hidden}
.empty{text-align:center;color:#6b7280;font-weight:900;padding:24px}
@media(max-width:760px){
    .container{padding:14px}
    .header{flex-direction:column}
    .back{width:100%;text-align:center}
}
</style>
</head>

<body>
<div class="container">

<div class="header">
    <div>
        <h1>A3 Цепочки автоматизации</h1>
        <div class="meta">
            Центр визуального просмотра workflow-цепочек: триггеры, правила, действия, события и состояние.
        </div>
    </div>

    <div style="display:flex;gap:10px;flex-wrap:wrap">
        <a href="/automation" class="back">← Автоматизация</a>
        <a href="/" class="back">Главная</a>
    </div>
</div>

<div class="card">
    <h2>Фильтры</h2>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="back" onclick="setWorkflowFilter('all')">Все</button>
        <button class="back" onclick="setWorkflowFilter('active')">Активные</button>
        <button class="back" onclick="setWorkflowFilter('disabled')">Выключенные</button>
        <button class="back" onclick="setWorkflowFilter('problematic')">Проблемные</button>
        <button class="back" onclick="setWorkflowFilter('empty')">Без действий</button>
    </div>
</div>

<div class="card">
    <h2>Обзор</h2>
    <div id="workflow-summary" class="meta">Загрузка...</div>
</div>

<div id="workflow-list" class="grid"></div>

</div>

<script>
let workflowFilter = "all";

function setWorkflowFilter(filter) {
    workflowFilter = filter;
    loadWorkflows();
}

function statusLabel(rule, actions) {
    if (!rule.active) return ["Выключена", "off", "Выключено"];
    if (!actions.length) return ["Нет действий", "warn", "Нужно действие"];
    return ["Активна", "ok", "Хорошее"];
}

function workflowGraphSvg() {
    return `
        <svg width="100%" height="76" viewBox="0 0 760 76" preserveAspectRatio="xMidYMid meet">
            <line x1="130" y1="38" x2="250" y2="38" stroke="#9ca3af" stroke-width="3"/>
            <line x1="370" y1="38" x2="490" y2="38" stroke="#9ca3af" stroke-width="3"/>
            <line x1="610" y1="38" x2="710" y2="38" stroke="#9ca3af" stroke-width="3"/>

            <rect x="20" y="16" rx="14" width="110" height="44" fill="#dbeafe"/>
            <text x="75" y="43" text-anchor="middle" font-size="13" font-weight="700">Триггер</text>

            <rect x="250" y="16" rx="14" width="120" height="44" fill="#dcfce7"/>
            <text x="310" y="43" text-anchor="middle" font-size="13" font-weight="700">Правило</text>

            <rect x="490" y="16" rx="14" width="120" height="44" fill="#fef3c7"/>
            <text x="550" y="43" text-anchor="middle" font-size="13" font-weight="700">Действия</text>

            <rect x="710" y="16" rx="14" width="120" height="44" fill="#fee2e2"/>
            <text x="770" y="43" text-anchor="middle" font-size="13" font-weight="700">События</text>
        </svg>
    `;
}

async function loadWorkflows() {
    const list = document.getElementById("workflow-list");
    const summary = document.getElementById("workflow-summary");

    try {
        const response = await fetch("/api/a3/workflows/graph");
        const data = await response.json();

        const workflows = data.workflows || data.items || [];
        let rendered = 0;

        list.innerHTML = "";

        for (const workflow of workflows) {
            const rule = workflow.rule || workflow;
            const actions = workflow.actions || [];
            const events = workflow.events || [];
            const trigger = workflow.trigger || {};

            if (workflowFilter === "active" && !rule.active) continue;
            if (workflowFilter === "disabled" && rule.active) continue;
            if (workflowFilter === "problematic" && rule.active && actions.length > 0) continue;
            if (workflowFilter === "empty" && actions.length > 0) continue;

            const [label, cls] = statusLabel(rule, actions);

            const workflowHealth = workflow.health || {};

            let healthTitle =
                workflowHealth.title || "Стабильно";

            let healthScore =
                workflowHealth.score ?? 100;

            let healthClass = "ok";

            if (workflowHealth.status === "warning") {
                healthClass = "warn";
            }

            if (
                workflowHealth.status === "degraded"
                || workflowHealth.status === "critical"
            ) {
                healthClass = "off";
            }

            const card = document.createElement("div");
            card.className = "workflow";

            card.innerHTML = `
                <div class="workflow-title">${rule.name || "Без названия"}</div>

                <div>
                    <span class="pill ${cls}">${label}</span>
                    <span class="pill ${healthClass}">
                        Health: ${healthTitle} (${healthScore})
                    </span>
                    <span class="pill">Действий: ${actions.length || rule.actions_count || 0}</span>
                    <span class="pill">Событий: ${events.length || rule.events_count || 0}</span>
                </div>

                <div class="graph-box">${workflowGraphSvg()}</div>

                <div class="meta" style="margin-top:14px">
                    ${trigger.label || rule.trigger_key || "Триггер не указан"}
                </div>

                <div style="margin-top:12px">
                    ${(workflowHealth.issues || [])
                        .slice(0, 2)
                        .map(issue => `
                            <div class="pill ${healthClass}">
                                ${issue}
                            </div>
                        `)
                        .join("")}
                </div>

                <div style="
                    margin-top:16px;
                    display:flex;
                    gap:10px;
                    flex-wrap:wrap;
                ">
                    <a class="back"
                       href="/automation/rules/${rule.id}">
                        Открыть
                    </a>

                    <button class="back"
                            onclick="runWorkflowRule(${rule.id})">
                        Запустить
                    </button>

                    <a class="back"
                       href="/automation/events?rule_id=${rule.id}">
                        События
                    </a>

                    <a class="back"
                       href="/automation/diagnostics">
                        Диагностика
                    </a>

                    <button class="back"
                            onclick="flagWorkflow(${rule.id})">
                        Проблема
                    </button>
                </div>
            `;

            list.appendChild(card);
            rendered += 1;
        }

        summary.textContent =
            "Всего цепочек: " + workflows.length + ". Показано: " + rendered + ".";

        if (!rendered) {
            list.innerHTML = '<div class="card empty">По выбранному фильтру цепочки не найдены</div>';
        }
    } catch (err) {
        console.error(err);
        summary.textContent = "Не удалось загрузить цепочки";
        list.innerHTML = '<div class="card empty">Ошибка загрузки workflow</div>';
    }
}

async function runWorkflowRule(ruleId) {
    try {
        await fetch(`/automation/rules/${ruleId}/run`, {
            method: "POST"
        });

        alert("Цепочка запущена");
    } catch (err) {
        console.error(err);
        alert("Не удалось запустить цепочку");
    }
}

async function flagWorkflow(ruleId) {
    try {
        await fetch("/api/a3/ops-timeline", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                event_type: "workflow_flag",
                severity: "warning",
                title: "Workflow помечен как проблемный",
                message: `Rule #${ruleId} требует проверки`,
                target_type: "automation_rule",
                target_id: ruleId
            })
        });

        alert("Цепочка помечена");
    } catch (err) {
        console.error(err);
        alert("Не удалось пометить цепочку");
    }
}

loadWorkflows();
</script>

</body>
</html>
