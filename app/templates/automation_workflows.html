<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A3 Цепочки автоматизации</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="stylesheet" href="/static/app.css">

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:#f3f4f6;color:#111827}
.container{max-width:1180px;margin:auto;padding:24px}
.header{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;margin-bottom:18px}
.card{background:white;padding:18px;border-radius:20px;box-shadow:0 10px 25px rgba(0,0,0,.07);margin-bottom:14px}
.back{display:inline-block;padding:10px 14px;border-radius:14px;background:#111827;color:white;text-decoration:none;font-weight:900;border:0;cursor:pointer}
h1{margin:0 0 8px;font-size:30px}
h2{margin:0 0 16px;font-size:20px}
.meta{color:#6b7280;font-weight:800;line-height:1.45}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(310px,1fr));gap:14px}
.chain{border:1px solid #e5e7eb;background:#f9fafb;border-radius:22px;padding:14px}
.chain-title{font-size:17px;font-weight:900;margin-bottom:8px}
.pill{display:inline-block;padding:6px 9px;border-radius:999px;background:#dbeafe;color:#1d4ed8;font-weight:900;font-size:13px;margin-right:6px;margin-top:6px}
.pill.ok{background:#dcfce7;color:#166534}
.pill.warn{background:#fef3c7;color:#92400e}
.pill.off{background:#fee2e2;color:#991b1b}
.graph-box{margin-top:12px;padding:10px;border-radius:18px;background:white;border:1px solid #e5e7eb;overflow:hidden}
.flow-edge{stroke-dasharray:8 7;animation:flowMove 1.6s linear infinite}
.chain:hover{transform:translateY(-2px);box-shadow:0 14px 30px rgba(0,0,0,.09)}
.chain{transition:.18s ease}
.chain.active{
    border-color:#86efac;
    box-shadow:0 0 0 1px rgba(134,239,172,.18);
}
.chain.active .graph-box{
    animation:activeGlow 2.4s ease-in-out infinite;
}
@keyframes activeGlow{
    0%,100%{
        box-shadow:0 0 0 rgba(34,197,94,0);
    }
    50%{
        box-shadow:0 0 18px rgba(34,197,94,.18);
    }
}
@keyframes flowMove{to{stroke-dashoffset:-36}}
.chain.problem .flow-edge{stroke-dasharray:8 7;animation:flowMove 1.6s linear infinite}
.chain.critical .flow-edge{stroke-dasharray:8 7;animation:flowMove 1.6s linear infinite}
.chain.active .flow-edge{stroke-dasharray:8 7;animation:flowMove 1.6s linear infinite}
.chain.problem{border-color:#f97316;box-shadow:0 0 0 1px rgba(249,115,22,.18)}
.chain.critical{border-color:#dc2626;box-shadow:0 0 0 1px rgba(220,38,38,.22)}
.chain.problem .graph-box{animation:softPulse 1.8s ease-in-out infinite}
.chain.critical .graph-box{animation:criticalPulse 1.4s ease-in-out infinite}
@keyframes softPulse{
    0%,100%{box-shadow:0 0 0 rgba(249,115,22,0)}
    50%{box-shadow:0 0 18px rgba(249,115,22,.22)}
}
@keyframes criticalPulse{
    0%,100%{box-shadow:0 0 0 rgba(220,38,38,0)}
    50%{box-shadow:0 0 22px rgba(220,38,38,.28)}
}
.empty{text-align:center;color:#6b7280;font-weight:900;padding:24px}
@media(max-width:760px){
    .container{padding:14px}
    .header{flex-direction:column}
    .back{width:100%;text-align:center}
}
</style>
</head>

<body>
<div class="container">

<div class="header">
    <div>
        <h1>A3 Цепочки автоматизации</h1>
        <div class="meta">
            Все цепочки автоматизации в одном месте.
        </div>
    </div>

    <div style="display:flex;gap:10px;flex-wrap:wrap">
        <a href="/automation" class="back">← Автоматизация</a>
        <a href="/" class="back">Главная</a>
    </div>
</div>

<div class="card">
    <h2>Фильтры цепочек</h2>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="back" onclick="setChainFilter('all')">Все</button>
        <button class="back" onclick="setChainFilter('active')">Активные</button>
        <button class="back" onclick="setChainFilter('disabled')">Выключенные</button>
        <button class="back" onclick="setChainFilter('problematic')">Проблемные</button>
        <button class="back" onclick="setChainFilter('empty')">Без действий</button>
    </div>
</div>

<div class="card">
    <h2>Сводка</h2>
    <div id="chains-summary" class="meta">Загрузка...</div>
</div>

<div class="card">
    <div style="display:flex;justify-content:space-between;gap:14px;align-items:flex-start;flex-wrap:wrap">
        <div>
            <h2>Проблемные цепочки</h2>
            <div class="meta">
                Цепочки, которые требуют внимания.
            </div>
        </div>
        <div class="pill off">Центр проблем</div>
    </div>

    <div id="problem-chains" style="display:flex;flex-direction:column;gap:10px;margin-top:18px"></div>
</div>

<div id="chains-list" class="grid"></div>

</div>

<script>
let chainFilter = "all";

function setChainFilter(filter) {
    chainFilter = filter;
    loadChains();
}

function getChainStatus(rule, actions) {
    if (!rule.active) return ["Выключена", "off"];
    if (!actions.length) return ["Нет действий", "warn"];
    return ["Активна", "ok"];
}

function renderChainGraph(chain) {
    const trigger = chain.trigger || {};
    const actions = chain.actions || [];
    const events = chain.events || [];
    const state = chain.health || {};

    let ruleColor = "#dcfce7";
    let actionColor = "#fef3c7";
    let eventColor = "#ede9fe";
    let edgeColor = "#64748b";

    if (state.status === "warning") {
        ruleColor = "#fef3c7";
        edgeColor = "#f59e0b";
    }

    if (state.status === "degraded") {
        ruleColor = "#ffedd5";
        actionColor = "#fed7aa";
        edgeColor = "#ea580c";
    }

    if (state.status === "critical") {
        ruleColor = "#fee2e2";
        actionColor = "#fecaca";
        eventColor = "#fecaca";
        edgeColor = "#dc2626";
    }

    if (!actions.length) {
        actionColor = "#fee2e2";
        edgeColor = "#dc2626";
    }

    const nodes = [
        {x:20,label:trigger.label || "Триггер",color:"#dbeafe",stroke:"#2563eb"},
        {x:250,label:`Правило ${state.score ?? 100}`,color:ruleColor,stroke:"#22c55e"},
        {x:480,label:actions.length ? `Действия ${actions.length}` : "Нет действий",color:actionColor,stroke:"#eab308"},
        {x:710,label:events.length ? `События ${events.length}` : "События",color:eventColor,stroke:"#8b5cf6"}
    ];

    const edges = [
        [140,250],
        [370,480],
        [600,710]
    ];

    const edgeSvg = edges.map(edge => `
        <line
            x1="${edge[0]}"
            y1="38"
            x2="${edge[1]}"
            y2="38"
            class="flow-edge"
            stroke="${edgeColor}"
            stroke-width="3"
            stroke-linecap="round"
        />
    `).join("");

    const nodeSvg = nodes.map(node => `
        <g>
            <rect
                x="${node.x}"
                y="16"
                rx="12"
                width="120"
                height="44"
                fill="${node.color}"
                stroke="${node.stroke}"
                stroke-width="2"
            />

            <text
                x="${node.x + 60}"
                y="42"
                text-anchor="middle"
                font-size="12"
                font-weight="800"
            >
                ${node.label}
            </text>
        </g>
    `).join("");

    return `
        <svg
            width="100%"
            height="76"
            viewBox="0 0 860 76"
            preserveAspectRatio="xMidYMid meet"
        >
            ${edgeSvg}
            ${nodeSvg}
        </svg>
    `;
}

async function loadChains() {
    const list = document.getElementById("chains-list");
    const summary = document.getElementById("chains-summary");

    try {
        const response = await fetch("/api/a3/workflows/graph");
        const data = await response.json();
        const chains = data.workflows || data.items || [];

        let rendered = 0;
        list.innerHTML = "";

        for (const chain of chains) {
            const rule = chain.rule || chain;
            const actions = chain.actions || [];
            const events = chain.events || [];
            const trigger = chain.trigger || {};

            if (chainFilter === "active" && !rule.active) continue;
            if (chainFilter === "disabled" && rule.active) continue;
            if (chainFilter === "problematic" && rule.active && actions.length > 0) continue;
            if (chainFilter === "empty" && actions.length > 0) continue;

            const [label, cls] = getChainStatus(rule, actions);
            const state = chain.health || {};

            chain.playback = {
                active_step: 1
            };

            const stateTitle = state.title || "Стабильно";
            const stateScore = state.score ?? 100;

            let stateClass = "ok";
            if (state.status === "warning") stateClass = "warn";
            if (state.status === "degraded" || state.status === "critical") stateClass = "off";

            const card = document.createElement("div");

            let cardClass = "chain";

            if (
                state.status !== "warning"
                && state.status !== "degraded"
                && state.status !== "critical"
            ) {
                cardClass += " active";
            }

            if (state.status === "warning" || state.status === "degraded") {
                cardClass += " problem";
            }

            if (state.status === "critical") {
                cardClass += " critical";
            }

            card.className = cardClass;

            card.innerHTML = `
                <div class="chain-title">${rule.name || "Без названия"}</div>

                <div>
                    <span class="pill ${cls}">${label}</span>
                    <span class="pill ${stateClass}">Состояние: ${stateTitle} (${stateScore})</span>
                    <span class="pill">Действий: ${actions.length || rule.actions_count || 0}</span>
                    <span class="pill">Событий: ${events.length || rule.events_count || 0}</span>
                </div>

                <div class="graph-box">${renderChainGraph(chain)}</div>

                <div class="meta" style="margin-top:14px">
                    ${trigger.label || rule.trigger_key || "Триггер не указан"}
                </div>

                <div style="margin-top:12px">
                    ${(state.issues || []).slice(0, 3).map(issue => `
                        <div class="pill ${stateClass}">${issue}</div>
                    `).join("")}
                </div>

                <div style="margin-top:14px;padding:14px;border-radius:16px;background:#ffffff;border:1px solid #e5e7eb">
                    <div style="font-weight:900;margin-bottom:10px">Рекомендации AI</div>
                    <div style="display:flex;flex-direction:column;gap:8px">
                        ${(state.recommendations || []).slice(0, 3).map(rec => `
                            <div class="meta">• ${rec}</div>
                        `).join("")}
                    </div>
                </div>

                <div id="timeline-${rule.id}"
                     style="margin-top:14px;padding:14px;border-radius:16px;background:#ffffff;border:1px solid #e5e7eb">
                    <div style="font-weight:900;margin-bottom:10px">
                        Последние события
                    </div>
                    <div class="meta">Загрузка истории...</div>
                </div>

                <div style="margin-top:16px;display:flex;gap:10px;flex-wrap:wrap">
                    <a class="back" href="/automation/rules/${rule.id}">Открыть</a>
                    <button class="back" onclick="runChain(${rule.id})">Запустить</button>
                    <button class="back" onclick="loadChainTimeline(${rule.id})">Обновить историю</button>
                    <a class="back" href="/automation?event_rule_id=${rule.id}">События</a>
                    <a class="back" href="/automation/diagnostics">Диагностика</a>
                    <button class="back" onclick="flagChain(${rule.id})">Проблема</button>
                </div>
            `;

            list.appendChild(card);
            loadChainTimeline(rule.id);
            rendered += 1;
        }

        summary.textContent = "Всего цепочек: " + chains.length + ". Показано: " + rendered + ".";
        renderProblemChains(chains);

        if (!rendered) {
            list.innerHTML = '<div class="card empty">По выбранному фильтру цепочки не найдены</div>';
        }
    } catch (err) {
        console.error(err);
        summary.textContent = "Не удалось загрузить цепочки";
        list.innerHTML = '<div class="card empty">Ошибка загрузки цепочек</div>';
    }
}

async function loadChainTimeline(ruleId) {
    const container = document.getElementById(`timeline-${ruleId}`);

    if (!container) {
        return;
    }

    try {
        const response = await fetch(`/api/a3/workflow/rules/${ruleId}/timeline`);
        const data = await response.json();
        const timeline = data.timeline || {};
        const steps = timeline.steps || [];

        if (!steps.length) {
            container.innerHTML = `
                <div style="font-weight:900;margin-bottom:10px">
                    Последние события
                </div>
                <div class="meta">История запусков пока пуста</div>
            `;
            return;
        }

        container.innerHTML = `
            <div style="font-weight:900;margin-bottom:10px">
                Последние события
            </div>

            <div style="display:flex;flex-direction:column;gap:8px">
                ${steps.slice(0, 5).map(step => {
                    let cls = "pill";

                    if (step.level === "success") {
                        cls += " ok";
                    } else if (step.level === "warning") {
                        cls += " warn";
                    } else if (step.level === "critical") {
                        cls += " off";
                    }

                    return `
                        <div style="display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;align-items:center">
                            <div>
                                <span class="${cls}">
                                    ${step.label}
                                </span>
                                <span class="meta">
                                    ${step.message || "Без сообщения"}
                                </span>
                            </div>
                            <div class="meta">
                                ${step.created_at || ""}
                            </div>
                        </div>
                    `;
                }).join("")}
            </div>
        `;
    } catch (err) {
        console.error(err);

        container.innerHTML = `
            <div style="font-weight:900;margin-bottom:10px">
                Последние события
            </div>
            <div class="meta">Не удалось загрузить историю</div>
        `;
    }
}


async function runChain(ruleId) {
    try {
        await fetch(`/automation/rules/${ruleId}/run`, {method:"POST"});
        alert("Цепочка запущена");
    } catch (err) {
        console.error(err);
        alert("Не удалось запустить цепочку");
    }
}

async function flagChain(ruleId) {
    try {
        await fetch("/api/a3/ops-timeline", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({
                event_type:"chain_flag",
                severity:"warning",
                title:"Цепочка помечена как проблемная",
                message:`Правило #${ruleId} требует проверки`,
                target_type:"automation_rule",
                target_id:ruleId
            })
        });

        alert("Цепочка помечена");
    } catch (err) {
        console.error(err);
        alert("Не удалось пометить цепочку");
    }
}

async function enableChain(ruleId) {
    try {
        await fetch(`/automation/rules/${ruleId}/toggle`, {method:"POST"});
        loadChains();
        alert("Правило включено");
    } catch (err) {
        console.error(err);
        alert("Не удалось включить правило");
    }
}

async function retryChain(ruleId) {
    try {
        await fetch("/api/a3/self-healing/run", {method:"POST"});
        alert("Повторный запуск отправлен");
    } catch (err) {
        console.error(err);
        alert("Не удалось повторить запуск");
    }
}

async function markChainFixed(ruleId) {
    try {
        await fetch("/api/a3/ops-timeline", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({
                event_type:"chain_fix",
                severity:"info",
                title:"Цепочка помечена как исправленная",
                message:`Правило #${ruleId} помечено как исправленное`,
                target_type:"automation_rule",
                target_id:ruleId
            })
        });

        alert("Цепочка помечена как исправленная");
    } catch (err) {
        console.error(err);
        alert("Не удалось обновить цепочку");
    }
}

function renderProblemChains(chains) {
    const container = document.getElementById("problem-chains");

    if (!container) return;

    container.innerHTML = "";

    const problematic = chains
        .filter(chain => {
            const state = chain.health || {};
            return ["warning", "degraded", "critical"].includes(state.status);
        })
        .sort((a, b) => (a.health?.score || 100) - (b.health?.score || 100))
        .slice(0, 8);

    if (!problematic.length) {
        container.innerHTML = '<div class="pill ok">Критических проблем не найдено</div>';
        return;
    }

    for (const chain of problematic) {
        const rule = chain.rule || {};
        const state = chain.health || {};
        const card = document.createElement("div");

        card.style.padding = "16px";
        card.style.borderRadius = "18px";
        card.style.background = "#fff7ed";
        card.style.border = "1px solid #fdba74";

        card.innerHTML = `
            <div style="display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap">
                <div>
                    <div style="font-size:16px;font-weight:900">${rule.name || "Без названия"}</div>

                    <div style="margin-top:10px">
                        <span class="pill off">${state.title || "Проблема"}</span>
                        <span class="pill off">Оценка: ${state.score || 0}</span>
                    </div>

                    <div style="margin-top:12px;display:flex;flex-wrap:wrap;gap:8px">
                        ${(state.issues || []).slice(0, 2).map(issue => `
                            <span class="pill off">${issue}</span>
                        `).join("")}
                    </div>
                </div>

                <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
                    <a class="back" href="/automation/rules/${rule.id}">Открыть</a>
                    <button class="back" onclick="runChain(${rule.id})">Запустить</button>
                    <button class="back" onclick="enableChain(${rule.id})">Включить</button>
                    <button class="back" onclick="retryChain(${rule.id})">Повторить</button>
                    <button class="back" onclick="markChainFixed(${rule.id})">Исправлено</button>
                </div>
            </div>
        `;

        container.appendChild(card);
    }
}

function startPlaybackLoop() {
    setInterval(() => {
        document.querySelectorAll(".chain").forEach((card, index) => {
            const svgNodes = card.querySelectorAll("svg g");

            if (!svgNodes.length) {
                return;
            }

            const step = (Math.floor(Date.now() / 900) + index) % 4;

            svgNodes.forEach(node => {
                node.classList.remove("active-runtime-node");
            });

            const targetNode = svgNodes[step + 3];

            if (targetNode) {
                targetNode.classList.add("active-runtime-node");
            }
        });
    }, 900);
}

loadChains();
startPlaybackLoop();
</script>

</body>
</html>
