<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Архив заявок</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="stylesheet" href="/static/app.css">

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:#f3f4f6;color:#111827}
.container{max-width:1100px;margin:auto;padding:28px}
.header{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:24px}
h1{margin:0;font-size:34px}
.back{color:#2563eb;text-decoration:none;font-weight:900}
.card{background:white;padding:22px;border-radius:24px;box-shadow:0 10px 25px rgba(0,0,0,.07);margin-bottom:14px}
.row{display:grid;grid-template-columns:1.2fr 1fr 1fr 1fr auto;gap:14px;align-items:center}
.label{font-size:12px;color:#6b7280;font-weight:800;margin-bottom:5px}
.value{font-size:16px;font-weight:900;word-break:break-word}
.btn{display:inline-block;padding:12px 16px;border-radius:14px;background:#2563eb;color:white;text-decoration:none;font-weight:900;text-align:center}
.empty{background:white;padding:34px;border-radius:24px;text-align:center;font-size:18px;font-weight:900;color:#6b7280}
.badge{display:inline-block;padding:7px 12px;border-radius:999px;background:#fee2e2;color:#991b1b;font-weight:900}
@media(max-width:800px){
.container{padding:16px}
.header{display:block}
h1{font-size:28px;margin-bottom:12px}
.row{grid-template-columns:1fr}
.btn{display:block}
}
</style>
</head>

<body>
<div class="container">

<div class="header">
    <div>
        <h1>🗄 Архив заявок</h1>
        <div style="color:#6b7280;font-weight:800;margin-top:6px">
            Вы вошли как: {{ username }} / {{ role }}
        </div>
    </div>
    <a href="/" class="back">← Назад</a>
</div>

{% if tasks %}
{% for task in tasks %}
<div class="card">
    <div class="row">
        <div>
            <div class="label">Клиент</div>
            <div class="value">{{ task["client"] }}</div>
        </div>

        <div>
            <div class="label">Адрес</div>
            <div class="value">{{ task["address"] }}</div>
        </div>

        <div>
            <div class="label">Исполнитель</div>
            <div class="value">{{ task["worker"] }}</div>
        </div>

        <div>
            <div class="label">Статус</div>
            <div class="badge">{{ task["status"] }}</div>
        </div>

        <div>
            <a class="btn" href="/task/{{ task['id'] }}">Открыть</a>
        </div>
    </div>
</div>
{% endfor %}
{% else %}
<div class="empty">Архив пуст</div>
{% endif %}

</div>
</body>
</html>
