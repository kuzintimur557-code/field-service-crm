<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Уведомления</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="stylesheet" href="/static/app.css">

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:#f3f4f6;color:#111827}
.container{max-width:900px;margin:auto;padding:24px}
.back{display:inline-block;margin-bottom:18px;color:#2563eb;text-decoration:none;font-weight:900}
.card{background:white;padding:24px;border-radius:24px;box-shadow:0 10px 25px rgba(0,0,0,.07);margin-bottom:16px}
h1{margin:0 0 8px;font-size:34px}
.meta{color:#6b7280;font-weight:800}
.notice{display:block;background:#f9fafb;padding:16px;border-radius:18px;margin-bottom:12px;text-decoration:none;color:#111827;border:1px solid #e5e7eb}
.notice.unread{background:#eff6ff;border-color:#bfdbfe}
.title{font-size:18px;font-weight:900}
.message{margin-top:8px;color:#374151;font-weight:800}
.date{margin-top:8px;color:#6b7280;font-size:13px;font-weight:800}
@media(max-width:700px){.container{padding:14px}h1{font-size:28px}}
</style>
</head>

<body>
<div class="container">

<a href="/" class="back">← Назад</a>

<div class="card">
<h1>🔔 Уведомления</h1>
<div class="meta">Непрочитанных: {{ unread_count }}</div>
</div>

<div class="card">
{% if notifications %}
{% for item in notifications %}
<a class="notice {% if item['is_read'] == 0 %}unread{% endif %}" href="{{ item['link'] or '#' }}">
    <div class="title">{{ item["title"] }}</div>
    <div class="message">{{ item["message"] }}</div>
    <div class="date">{{ item["created_at"] }}</div>
</a>
{% endfor %}
{% else %}
<div class="meta">Уведомлений пока нет</div>
{% endif %}
</div>

</div>

{% include 'mobile_nav.html' %}
</body>
</html>
