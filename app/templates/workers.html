<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Монтажники</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:#f3f4f6;color:#111827}
.container{max-width:900px;margin:auto;padding:28px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;gap:12px;flex-wrap:wrap}
h1{font-size:32px;margin:0}
.btn{display:inline-block;padding:14px 18px;background:#2563eb;color:white;border-radius:16px;text-decoration:none;font-weight:900}
.card{background:white;padding:26px;border-radius:26px;box-shadow:0 12px 30px rgba(0,0,0,.08);margin-bottom:20px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
label{display:block;font-weight:800;margin:12px 0 6px}
input{width:100%;padding:15px;border:1px solid #d1d5db;border-radius:14px;font-size:16px}
button{width:100%;margin-top:18px;padding:15px;border:0;border-radius:16px;background:#111827;color:white;font-weight:900;font-size:16px;cursor:pointer}
.worker{padding:16px;border-radius:18px;background:#f9fafb;margin-bottom:10px;font-weight:900}
@media(max-width:700px){.container{padding:16px}.grid{grid-template-columns:1fr}}
</style>
</head>

<body>
<div class="container">

<div class="header">
<h1>👷 Монтажники</h1>
<a href="/" class="btn">← Dashboard</a>
</div>

<div class="card">
<h2>Добавить монтажника</h2>

<form method="post" action="/workers">

<div class="grid">
<div>
<label>Логин</label>
<input name="username" placeholder="например: ivan" required>
</div>

<div>
<label>Пароль</label>
<input name="password" placeholder="например: 12345" required>
</div>
</div>

<button type="submit">➕ Создать монтажника</button>

</form>
</div>

<div class="card">
<h2>Список монтажников</h2>

{% for worker in workers %}
<div class="worker">
{{ worker["username"] }}
</div>
{% else %}
<p>Монтажников пока нет.</p>
{% endfor %}

</div>

</div>
</body>
</html>
