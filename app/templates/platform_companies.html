<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Компании</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="stylesheet" href="/static/app.css">

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:#f3f4f6;color:#111827}
.container{max-width:1050px;margin:auto;padding:28px}
.back{display:inline-block;margin-bottom:18px;color:#2563eb;text-decoration:none;font-weight:900}
.card{background:white;padding:28px;border-radius:26px;box-shadow:0 12px 30px rgba(0,0,0,.08);margin-bottom:22px}
h1{margin:0 0 12px;font-size:36px}
.company{display:grid;grid-template-columns:.5fr 1.5fr 1fr 1fr;gap:14px;background:#f9fafb;padding:16px;border-radius:18px;margin-bottom:10px;align-items:center}
.name{font-size:18px;font-weight:900}
.meta{font-size:14px;color:#6b7280;font-weight:800}
@media(max-width:850px){.container{padding:16px}.company{grid-template-columns:1fr}h1{font-size:30px}}
</style>
</head>

<body>
<div class="container">

<a href="/platform" class="back">← Назад</a>

<div class="card">
<h1>🏢 Компании</h1>
<div class="meta">SaaS-клиенты платформы</div>
</div>

<div class="card">
{% if companies %}
{% for company in companies %}
<div class="company">
    <div class="name">#{{ company["id"] }}</div>
    <div>
        <div class="name">{{ company["name"] }}</div>
        <div class="meta">Создана: {{ company["created_at"] }}</div>
    </div>
    <div class="meta">Owner: {{ company["owner_username"] }}</div>
    <div class="meta">Статус: active</div>
</div>
{% endfor %}
{% else %}
<div class="meta">Компаний пока нет</div>
{% endif %}
</div>

</div>
</body>
</html>
