<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>CRM</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f7fb;
            margin: 0;
            padding: 30px;
        }

        .top {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .btn {
            background: #2563eb;
            color: white;
            padding: 12px 18px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            margin-left: 8px;
        }

        .logout {
            background: #ef4444;
        }

        .task {
            background: white;
            padding: 22px;
            border-radius: 18px;
            margin-bottom: 16px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.08);
        }

        .task a {
            color: black;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="top">
    <h1>🚀 Field Service CRM</h1>

    <div>
        <a class="btn" href="/create-task">➕ Новая заявка</a>
        <a class="btn logout" href="/logout">Выйти</a>
    </div>
</div>

{% for task in tasks %}

<div class="task">

    <a href="/task/{{ task[0] }}">
        <h2>#{{ task[0] }} — {{ task[1] }}</h2>
    </a>

    <p>📞 {{ task[2] }}</p>
    <p>📍 {{ task[3] }}</p>
    <p>📝 {{ task[4] }}</p>
    <p>📅 {{ task[5] }}</p>
    <p>👷 {{ task[6] }}</p>
    <p>💰 ${{ task[8] }}</p>
    <p>📌 {{ task[10] }}</p>

</div>

{% else %}

<p>Заявок пока нет.</p>

{% endfor %}

</body>
</html>
