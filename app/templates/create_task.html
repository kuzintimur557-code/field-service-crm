<!DOCTYPE html>
<html>
<head>
    <title>Create task</title>
</head>
<body>

<h1>Create task</h1>

<form
    method="post"
    enctype="multipart/form-data"
>

    <input type="text" name="client" placeholder="Client"><br><br>

    <input type="text" name="phone" placeholder="Phone"><br><br>

    <input type="text" name="address" placeholder="Address"><br><br>

    <textarea
        name="description"
        placeholder="Description"
    ></textarea>

    <br><br>

    <input type="text" name="task_date" placeholder="Date"><br><br>

    <input type="text" name="worker" placeholder="Worker"><br><br>

    <input type="text" name="priority" placeholder="Priority"><br><br>

    <input type="text" name="price" placeholder="Price"><br><br>

    <input type="file" name="photo"><br><br>

    <button type="submit">
        Create
    </button>

</form>

</body>
</html>
