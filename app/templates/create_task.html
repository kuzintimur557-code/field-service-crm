<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>

<title>Create Task</title>

<style>

body{
margin:0;
background:#f4f7fb;
font-family:Arial;
}

.container{
max-width:800px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:24px;
border-radius:24px;
box-shadow:0 4px 20px rgba(0,0,0,0.05);
}

h1{
margin-top:0;
}

input,
textarea,
select{
width:100%;
padding:14px;
margin-bottom:14px;
border-radius:12px;
border:1px solid #ddd;
box-sizing:border-box;
font-size:16px;
}

button{
width:100%;
background:#2d89ef;
color:white;
border:none;
padding:16px;
border-radius:14px;
font-size:18px;
cursor:pointer;
}

.back{
display:inline-block;
margin-bottom:20px;
text-decoration:none;
font-weight:bold;
font-size:18px;
}

</style>

</head>

<body>

<div class="container">

<a href="/" class="back">
← Назад
</a>

<div class="card">

<h1>
➕ Новая заявка
</h1>

<form
method="post"
action="/create-task"
enctype="multipart/form-data"
>

<label>
Клиент
</label>

<input
type="text"
name="client"
required
>

<label>
Телефон
</label>

<input
type="text"
name="phone"
required
>

<label>
Адрес
</label>

<input
type="text"
name="address"
required
>

<label>
Описание
</label>

<textarea
name="description"
style="height:140px;"
></textarea>

<label>
Дата
</label>

<input
type="date"
name="task_date"
required
>

<label>
Монтажник
</label>

<select name="worker">

{% for worker in workers %}

<option value="{{ worker['username'] }}">
{{ worker["username"] }}
</option>

{% endfor %}

</select>

<label>
Приоритет
</label>

<select name="priority">

<option value="Низкий">
Низкий
</option>

<option value="Средний">
Средний
</option>

<option value="Высокий">
Высокий
</option>

</select>

<label>
Стоимость
</label>

<input
type="number"
name="price"
step="0.01"
value="0"
>

<label>
Фото / файл
</label>

<input
type="file"
name="photo"
>

<br><br>

<button>
🚀 Создать заявку
</button>

</form>

</div>

</div>

</body>
</html>
