<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Новая заявка</title>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:#f3f4f6;color:#111827}
.container{max-width:900px;margin:auto;padding:28px}
.back{display:inline-block;margin-bottom:18px;color:#2563eb;text-decoration:none;font-weight:900}
.card{background:white;padding:30px;border-radius:26px;box-shadow:0 12px 30px rgba(0,0,0,.08)}
h1{margin:0 0 24px;font-size:32px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
label{display:block;font-weight:800;margin:14px 0 7px}
input,textarea,select{width:100%;padding:15px;border:1px solid #d1d5db;border-radius:14px;font-size:16px;background:white}
textarea{height:140px;resize:vertical}
button{width:100%;margin-top:24px;padding:16px;border:0;border-radius:16px;background:#2563eb;color:white;font-size:18px;font-weight:900;cursor:pointer}
button:hover{background:#1d4ed8}
.note{background:#eff6ff;color:#1d4ed8;padding:14px;border-radius:16px;margin-bottom:20px;font-weight:700}
@media(max-width:700px){.container{padding:16px}.grid{grid-template-columns:1fr}h1{font-size:26px}}
</style>
</head>

<body>
<div class="container">

<a href="/" class="back">← Назад</a>

<div class="card">

<h1>➕ Новая заявка</h1>

<div class="note">
После создания заявка появится в CRM и уйдет уведомление в Telegram.
</div>

<form method="post" action="/create-task" enctype="multipart/form-data">

<label>Клиент</label>
<input name="client" placeholder="Имя клиента" required>

<div class="grid">
<div>
<label>Телефон</label>
<input name="phone" placeholder="+1 555 000 0000">
</div>

<div>
<label>Дата заявки</label>
<input name="task_date" type="date">
</div>
</div>

<label>Адрес</label>
<input name="address" placeholder="Адрес объекта">

<label>Описание</label>
<textarea name="description" placeholder="Что нужно сделать"></textarea>

<div class="grid">
<div>
<label>Исполнитель</label>
<select name="worker">
{% for worker in workers %}
<option value="{{ worker[0] }}">{{ worker[0] }}</option>
{% endfor %}
</select>
</div>

<div>
<label>Цена</label>
<input name="price" type="number" step="0.01" placeholder="0">
</div>
</div>

<label>Приоритет</label>
<select name="priority">
<option value="Обычный">Обычный</option>
<option value="Срочно">Срочно</option>
<option value="Низкий">Низкий</option>
</select>

<label>Фото / документ</label>
<input name="photo" type="file">

<button type="submit">🚀 Создать заявку</button>

</form>

</div>
</div>
</body>
</html>
